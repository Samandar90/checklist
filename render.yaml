services:
  - type: web
    name: hotel-branch-report-system
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/dashboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/prod.db
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
